ackermann_steering_controller:
  ros__parameters:
    # Joint names (Correct as of your last edit)
    rear_wheels_names: ["rear_left_wheel_joint", "rear_right_wheel_joint"]

    # Steering joints for the ackermann controller
    front_wheels_names: [front_left_steer_joint, front_right_steer_joint]

    front_wheels_state_names: [front_left_steer_joint, front_right_steer_joint]
    rear_wheels_state_names: [rear_left_wheel_joint, rear_right_wheel_joint]

    # Kinematics - Humble version requires these specific keys
    wheelbase: 0.26
    front_wheel_track: 0.22
    rear_wheel_track: 0.22
    front_wheels_radius: 0.055  # Changed from wheel_radius
    rear_wheels_radius: 0.055   # Changed from wheel_radius

    # Limits
    max_steer: 1.5
    min_steer: -1.5
    
    # Odometry & Frames
    base_frame_id: base_footprint
    odom_frame_id: odom
    publish_odom: true
    enable_odom_tf: true
    
    # Stability
    use_stamped_vel: false
    publish_rate: 50.0
    open_loop: true
    reference_timeout: 0.5

    publish_limited_velocity: true

    # linear:
